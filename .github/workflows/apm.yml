name: APM audit & pack

on:
  pull_request:
    paths:
      - 'apm.yml'
      - '.claude-plugin/**'
      - 'plugins/**'
      - '.github/workflows/apm.yml'
  push:
    tags:
      - 'v*'

jobs:
  audit-and-pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install APM
        run: |
          curl -fsSL https://github.com/microsoft/apm/releases/latest/download/apm-linux-x64 -o apm
          chmod +x apm
          ./apm --version

      - name: Audit for hidden Unicode and compromised packages
        run: ./apm audit .

      - name: Pack plugin artifact for all targets
        run: ./apm pack --format plugin --target all --output ./build

      - name: Upload plugin build
        uses: actions/upload-artifact@v4
        with:
          name: anvil-plugin-${{ github.sha }}
          path: ./build
          if-no-files-found: error
