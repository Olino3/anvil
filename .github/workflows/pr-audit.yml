name: PR APM Audit

on:
  pull_request:
    paths:
      - 'packages/**/.apm/**'

jobs:
  audit:
    uses: ./.github/workflows/_apm-audit.yml
    with:
      trigger: pr
      pr_number: ${{ github.event.pull_request.number }}
      base_ref: ${{ github.event.pull_request.base.sha }}
      head_ref: ${{ github.event.pull_request.head.sha }}
    permissions:
      contents: read
      pull-requests: write
